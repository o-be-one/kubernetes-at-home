site_name: Kubernetes at Home
repo_url: https://github.com/o-be-one/kubernetes-at-home
site_description: I'm running Kubernetes at home for non criticial prod apps and want to share how I did it to everyone.
site_author: Meddy Brai aka o_be_one
docs_dir: src
site_dir: site

theme:
  name: material
  palette:
    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default 
      primary: indigo
      accent: deep-orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: deep-orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotation
    - content.code.copy
  language: en

validation:
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn
  anchors: warn

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Home: index.md
  - Architecture: Architecture.md
  - Getting Started:
      - Installation: Getting Started/installation.md
  - Core Concepts:
      - GitOps:
          - ArgoCD: Core Concepts/GitOps/argocd.md
      - Networking & Exposure:
          - Cilium: Core Concepts/Networking & Exposure/cilium.md
          - Gateway API: Core Concepts/Networking & Exposure/gateway-api.md
          - cert-manager: Core Concepts/Networking & Exposure/cert-manager.md
          - Cloudflared (Public HTTP): Core Concepts/Networking & Exposure/cloudflared.md
          - External Access (UDP): Core Concepts/Networking & Exposure/external-access.md
      - Storage:
          - Longhorn: Core Concepts/Storage/longhorn.md
          - Synology CSI: Core Concepts/Storage/synology-csi.md
      - Security:
          - Encryption: Core Concepts/Security/encryption.md
  - Operators: Operators/operators.md
  - Maintenance:
      - Monitoring: Maintenance/monitoring.md
      - Troubleshooting: Maintenance/troubleshooting.md
      - Backup: Maintenance/backup.md
      - Upgrading: Maintenance/upgrading.md
  - Examples: Examples/examples.md